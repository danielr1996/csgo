/////////////
// Auswahl //
/////////////
//1: Primary
//2: Secondary
//3: Knife
//4: Smoke 	(slot8)
//5: Bombe 	(slot5)
//6: Decoy 	(slot9)
//7: Zeus
//F: Flash 	(slot7)
//Q: Molly 	(slot10)
//X: HE 	(slot6)
//V: Switch (slot4)

////////////////
// Buy Script //
////////////////
bind "kp_end" "buy ak47; buy m4a1;"
bind "kp_downarrow" "buy tec9; buy p250;"
bind "kp_pgdn" "buy vesthelm;"
bind "kp_rightarrow" "buy vest;"
bind "kp_pgup" "buy defuser;"
bind "kp_leftarrow" "buy mp7;"
bind "kp_home" "buy awp;"
bind "kp_5" "buy deagle;"
bind "kp_uparrow" "buy p90;"
bind "9" "buy flashbang"
bind "0" "buy smokegrenade"
bind "[" "buy hegrenade"
bind "]" "buy incgrenade"
bind "kp_slash" "buy galilar; buy famas;"
bind "kp_plus" "buy sg556; buy aug;"
bind "kp_minus" "buy bizon;"

//////////////////
// Key Bindings //
//////////////////
bind "MWHEELDOWN" "+jump"
bind "MWHEELUP" "+jump"
bind "MOUSE1" "+attack"
bind "MOUSE2" "+attack2"
bind "MOUSE4" "drop"
bind "MOUSE5" "+voicerecord"
bind "SHIFT" "+speed"
bind "CTRL" "+duck"
bind "SPACE" "+jump"
bind "TAB" "+showscores"

bindtoggle "F1" "voice_enable"
bindtoggle "F2" "net_graph"
bind "F3" "autobuy"
bind "F4" "rebuy"
bind "F5" "exec autoexec.cfg; echo config reloaded;"
bind "F6" "exec cheats.cfg;rcon exec cheats.cfg"
bind "F7" "exec nocheats.cfg;"
bind "F8" "callvote"

bind "1" "slot1"	// Primary
bind "2" "slot2"	// Secondary
bind "3" "slot3"	// Knife
bind "4" "slot8" 	// Smoke
bind "5" "slot5"	// Bombe
bind "6" "slot9"	// Decoy
bind "7" "slot11"	// Zeus
bind "F" "slot7" 	// Flashbang
bind "C" "slot10" 	// Molotow
bind "X" "slot6"	// HE
bind "V" "slot4"

bind "W" "+forward"
bind "A" "+moveleft"
bind "S" "+back"
bind "D" "+moveright"
bind "R" "+reload"
bind "E" "+use"
bind "G" "+lookatweapon"
bind "Z" "messagemode"
bind "U" "messagemode2"
bind "B" "buymenu"
bind "L" "radio1"
bind "O" "radio2"
bind "P" "radio3"
bind "M" "teammenu"
bind "\" "toggleconsole"



//////////////////
// Quick Switch //
//////////////////
alias +knife slot3
alias -knife lastinv
bind "Q" +knife

////////////////
// Jump Throw //
////////////////
alias "+jumpthrow" "+jump;-attack"  
alias "-jumpthrow" "-jump"  
bind "t" "+jumpthrow"  

